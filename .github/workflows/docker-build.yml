name: Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Base Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.base
        push: false
        tags: pitwall-base:latest

    - name: Build Template Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: templates/service/Dockerfile
        push: false
        tags: pitwall-template-service:latest
