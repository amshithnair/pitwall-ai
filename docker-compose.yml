version: '3.8'

services:
  # Relational metadata
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitwall_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # High-frequency telemetry & time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitwall_telemetry
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  # Event streaming and cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # AI embeddings (RAG knowledge corpus)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  timescaledb_data:
  redis_data:
  qdrant_data:
