
services:
  # Relational metadata
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitwall_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # High-frequency telemetry & time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitwall_telemetry
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  # Event streaming and cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # AI embeddings (RAG knowledge corpus)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Services
  template-service:
    build:
      context: .
      dockerfile: templates/service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis

  replay-engine:
    build:
      context: .
      dockerfile: services/replay-engine/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis
      - timescaledb

  provider-adapter:
    build:
      context: .
      dockerfile: services/provider-adapter/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis
    volumes:
      - fastf1_cache:/app/fastf1_cache

  normalizer:
    build:
      context: .
      dockerfile: services/normalizer/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis

  telemetry-engine:
    build:
      context: .
      dockerfile: services/telemetry-engine/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis
      - timescaledb

  strategy-engine:
    build:
      context: .
      dockerfile: services/strategy-engine/Dockerfile
    ports:
      - "8005:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis
      - postgres

  prediction-engine:
    build:
      context: .
      dockerfile: services/prediction-engine/Dockerfile
    ports:
      - "8006:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - MODELS_DIR=/app/models
    volumes:
      - prediction_models:/app/models
    depends_on:
      - redis
  ai-orchestrator:
    build:
      context: .
      dockerfile: services/ai-orchestrator/Dockerfile
    ports:
      - "8007:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-mock-key}
    depends_on:
      - redis
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8008:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - JWT_SECRET=super-secret-pitwall-key
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8008
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  timescaledb_data:
  prediction_models:
  redis_data:
  fastf1_cache:
  qdrant_data:
